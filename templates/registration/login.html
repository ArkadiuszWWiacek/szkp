{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie — SZKP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div class="szkp-login-page">
    <div class="szkp-login-card">
        <div class="szkp-login-card__top">
            <div class="szkp-login-brand">SZKP</div>
            <h1 class="szkp-login-title">Kancelaria Prawna</h1>
            <p class="szkp-login-sub">System zarządzania kancelarią</p>
        </div>

        <div class="szkp-login-card__body">
            {% if form.errors %}
            <div class="alert alert-danger" role="alert">
                Nieprawidłowy login lub hasło. Spróbuj ponownie.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_username" class="szkp-label">Login</label>
                    <input type="text" id="id_username" name="username"
                           class="szkp-input{% if form.username.errors %} is-invalid{% endif %}"
                           value="{{ form.username.value|default:'' }}"
                           autocomplete="username" autofocus>
                </div>

                <div class="mb-4">
                    <label for="id_password" class="szkp-label">Hasło</label>
                    <input type="password" id="id_password" name="password"
                           class="szkp-input{% if form.password.errors %} is-invalid{% endif %}"
                           autocomplete="current-password">
                </div>

                <button type="submit" class="btn-szkp btn-szkp--primary w-100">
                    Zaloguj się →
                </button>

                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
