{% if page_obj.has_other_pages %}
<div class="dash-pagination">
    {% if page_obj.has_previous %}
    <a href="{{ base_url }}page={{ page_obj.previous_page_number }}">‹</a>
    {% endif %}
    <span class="dash-page-current">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a href="{{ base_url }}page={{ page_obj.next_page_number }}">›</a>
    {% endif %}
</div>
{% endif %}
