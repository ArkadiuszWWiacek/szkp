<div class="szkp-card">
    <div class="szkp-card__body szkp-card__body--lg">

        {% if error %}
        <div class="alert alert-danger mb-4">{{ error }}</div>
        {% endif %}

        <p class="mb-1">{{ confirm_question }}</p>
        <p class="fw-medium fs-135 mb-{% if object_subtext %}1{% else %}4{% endif %}">{{ object_name }}</p>
        {% if object_subtext %}
        <p class="text-muted-szkp fs-13 mb-4">{{ object_subtext }}</p>
        {% endif %}
        {% if warning_text %}
        <p class="text-muted-szkp fs-13 mb-4">{{ warning_text }}</p>
        {% endif %}
        <p class="text-muted-szkp fs-13 mb-4">Tej operacji nie można cofnąć.</p>

        <div class="d-flex justify-content-end gap-3">
            <a href="{{ cancel_url }}" class="btn-szkp btn-szkp--outline">Anuluj</a>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn-szkp btn-szkp--danger">{{ confirm_text }}</button>
            </form>
        </div>

    </div>
</div>
